services:
  db:
    container_name: jobscouter-db
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jobscouter}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-jobscouter}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app_net

  backend:
    container_name: jobscouter-backend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_ENV: ${APP_ENV:-development}
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL_DOCKER:?DATABASE_URL_DOCKER is required}
      TZ: ${TZ:-America/Sao_Paulo}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./filters.yaml:/app/filters.yaml
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - app_net

  frontend:
    container_name: jobscouter-frontend
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_PATH: /api/v1
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./web:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - app_net

  nginx:
    container_name: jobscouter-nginx
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - app_net

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next_cache:

networks:
  app_net:
    driver: bridge
